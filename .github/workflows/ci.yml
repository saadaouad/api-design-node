name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ci_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_STAGE: test
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_test
      JWT_SECRET: ci-test-jwt-secret-minimum-length-ok-32chars

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
